<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paddle Prototype</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #1b3a4b;
      overflow: hidden;
      font-family: monospace;
      color: #fff;
    }
    canvas {
      display: block;
      image-rendering: pixelated;
    }
    #hud {
      position: fixed;
      top: 8px;
      left: 8px;
      background: rgba(0, 0, 0, 0.5);
      padding: 8px 12px;
      font-size: 13px;
      line-height: 1.5;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="hud">
    LEFT / RIGHT arrows to paddle<br>
    <span id="stats"></span>
  </div>
  <canvas id="world"></canvas>

  <script>
    // --- sprite sheet: second row of canoe_concept.gif ---
    // 4 frames, 40x45 each, at x = 0, 41, 82, 123, y = 45.
    // Frames 0-1: stroke on the left side. Frames 2-3: stroke on the right side.
    const FRAME_W = 40;
    const FRAME_H = 45;
    const FRAME_Y = 45;
    const FRAME_X = [0, 41, 82, 123];
    const LEFT_STROKE = [0, 1];
    const RIGHT_STROKE = [2, 3];
    const IDLE_FRAME = 1;

    const SCALE = 2;

    // --- physics tuning ---
    const TURN_PER_STROKE = Math.PI / 14;  // radians the boat rotates per press
    const THRUST_PER_STROKE = 25;          // px/sec added along heading per press
    const DRAG = 0.35;                     // fraction of velocity kept per second
    const STROKE_FRAME_MS = 110;           // ms per animation frame of a stroke

    const canvas = document.getElementById('world');
    const ctx = canvas.getContext('2d');
    const stats = document.getElementById('stats');

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      ctx.imageSmoothingEnabled = false;
    }
    window.addEventListener('resize', resize);
    resize();

    const sheet = new Image();
    sheet.src = '../img/canoe_concept.gif';

    const boat = {
      x: window.innerWidth / 2,
      y: window.innerHeight / 2,
      heading: -Math.PI / 2,   // pointing up; sprite faces east at heading 0
      vx: 0,
      vy: 0,
      // animation state
      strokeFrames: null,
      strokeStart: 0,
    };

    function paddle(side) {
      // a stroke on one side pushes the bow toward the opposite side,
      // then propels the boat along its new heading
      if (side === 'left') {
        boat.heading += TURN_PER_STROKE;
        boat.strokeFrames = LEFT_STROKE;
      } else {
        boat.heading -= TURN_PER_STROKE;
        boat.strokeFrames = RIGHT_STROKE;
      }
      boat.vx += Math.cos(boat.heading) * THRUST_PER_STROKE;
      boat.vy += Math.sin(boat.heading) * THRUST_PER_STROKE;
      boat.strokeStart = performance.now();
    }

    window.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft') { paddle('left'); e.preventDefault(); }
      if (e.key === 'ArrowRight') { paddle('right'); e.preventDefault(); }
    });

    function currentFrame(now) {
      if (boat.strokeFrames) {
        const i = Math.floor((now - boat.strokeStart) / STROKE_FRAME_MS);
        if (i < boat.strokeFrames.length) return boat.strokeFrames[i];
        boat.strokeFrames = null;
      }
      return IDLE_FRAME;
    }

    function drawVector(cx, cy) {
      const speed = Math.hypot(boat.vx, boat.vy);
      if (speed < 1) return;
      const angle = Math.atan2(boat.vy, boat.vx);
      const len = Math.min(30 + speed, 160);
      const tipX = cx + Math.cos(angle) * len;
      const tipY = cy + Math.sin(angle) * len;

      ctx.strokeStyle = '#ffdd55';
      ctx.fillStyle = '#ffdd55';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(tipX, tipY);
      ctx.stroke();

      // arrowhead
      const headLen = 10;
      ctx.beginPath();
      ctx.moveTo(tipX, tipY);
      ctx.lineTo(tipX - headLen * Math.cos(angle - 0.4), tipY - headLen * Math.sin(angle - 0.4));
      ctx.lineTo(tipX - headLen * Math.cos(angle + 0.4), tipY - headLen * Math.sin(angle + 0.4));
      ctx.closePath();
      ctx.fill();
    }

    let last = performance.now();
    function tick(now) {
      const dt = Math.min((now - last) / 1000, 0.1);
      last = now;

      // integrate velocity with water drag
      boat.x += boat.vx * dt;
      boat.y += boat.vy * dt;
      const keep = Math.pow(DRAG, dt);
      boat.vx *= keep;
      boat.vy *= keep;

      // wrap around the screen
      const m = FRAME_W * SCALE;
      if (boat.x < -m) boat.x = canvas.width + m;
      if (boat.x > canvas.width + m) boat.x = -m;
      if (boat.y < -m) boat.y = canvas.height + m;
      if (boat.y > canvas.height + m) boat.y = -m;

      // water
      ctx.fillStyle = '#2b6a8a';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      if (sheet.complete && sheet.naturalWidth) {
        const frame = currentFrame(now);
        ctx.save();
        ctx.translate(boat.x, boat.y);
        // sprite faces east in the sheet, so rotate by the heading directly
        ctx.rotate(boat.heading);
        ctx.drawImage(
          sheet,
          FRAME_X[frame], FRAME_Y, FRAME_W, FRAME_H,
          -FRAME_W * SCALE / 2, -FRAME_H * SCALE / 2,
          FRAME_W * SCALE, FRAME_H * SCALE
        );
        ctx.restore();
      }

      drawVector(boat.x, boat.y);

      const speed = Math.hypot(boat.vx, boat.vy);
      const deg = ((boat.heading * 180 / Math.PI) % 360 + 360) % 360;
      stats.textContent = 'speed: ' + speed.toFixed(0) + ' px/s  heading: ' + deg.toFixed(0) + '\u00B0';

      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  </script>
</body>
</html>
