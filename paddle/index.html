<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Paddle Prototype</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #1b3a4b;
      overflow: hidden;
      font-family: monospace;
      color: #fff;
      touch-action: none;
    }
    canvas {
      display: block;
      image-rendering: pixelated;
    }
    .joystick {
      position: fixed;
      bottom: 30px;
      width: 120px;
      height: 120px;
    }
    #joystick-left {
      left: 30px;
    }
    #joystick-right {
      right: 30px;
    }
    #hud {
      position: fixed;
      top: 8px;
      left: 8px;
      background: rgba(0, 0, 0, 0.5);
      padding: 8px 12px;
      font-size: 13px;
      line-height: 1.5;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="hud">
    LEFT / RIGHT arrows to paddle, or tap the joysticks<br>
    <span id="stats"></span>
  </div>
  <canvas id="world"></canvas>

  <div id="joystick-left" class="joystick"></div>
  <div id="joystick-right" class="joystick"></div>

  <script src="../thirdjs/nipplejs.min.js"></script>
  <script>
    // --- sprite sheet: second row of canoe_concept.gif ---
    // 4 frames, 40x45 each, at x = 0, 41, 82, 123, y = 45.
    // Frames 0-1: stroke on the left side. Frames 2-3: stroke on the right side.
    const FRAME_W = 40;
    const FRAME_H = 45;
    const FRAME_Y = 45;
    const FRAME_X = [0, 41, 82, 123];
    const LEFT_STROKE = [0, 1];
    const RIGHT_STROKE = [2, 3];
    const IDLE_FRAME = 1;

    // where the cowboy sits within a frame; used as the pivot for rotation
    const PIVOT_X = 20;
    const PIVOT_Y = 17;

    const SCALE = 2;

    // the demo only has one mode for now, but the joysticks are gated on
    // it so other modes (riding, shooting, ...) can reuse the same sticks
    const PADDLE = 'PADDLE';
    let MODE = PADDLE;

    // --- physics tuning ---
    const TURN_PER_STROKE = Math.PI / 14;  // radians the boat rotates per press
    const THRUST_PER_STROKE = 25;          // px/sec added along heading per press
    const DRAG = 0.35;                     // fraction of velocity kept per second
    const STROKE_FRAME_MS = 110;           // ms per animation frame of a stroke

    const DRAW_VECTOR = false;             // debug: draw the velocity arrow

    const canvas = document.getElementById('world');
    const ctx = canvas.getContext('2d');
    const stats = document.getElementById('stats');

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      ctx.imageSmoothingEnabled = false;
    }
    window.addEventListener('resize', resize);
    resize();

    const sheet = new Image();
    sheet.src = '../img/canoe_concept.gif';

    // --- lily pads ---
    const lilyPadImage = new Image();
    lilyPadImage.src = '../img/lily-pad.png';

    const LILY_PADS_PER_PIXEL = 1 / 60000;  // roughly one pad per 245x245 area
    let lilyPads = [];

    function scatterLilyPads() {
      const count = Math.round(canvas.width * canvas.height * LILY_PADS_PER_PIXEL);
      lilyPads = [];
      for (let i = 0; i < count; i++) {
        lilyPads.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          rotation: Math.random() * Math.PI * 2,
          scale: (0.6 + Math.random() * 0.8) / 2,
        });
      }
    }
    scatterLilyPads();
    window.addEventListener('resize', scatterLilyPads);

    function drawLilyPads() {
      if (!lilyPadImage.complete || !lilyPadImage.naturalWidth) return;
      for (const pad of lilyPads) {
        const w = lilyPadImage.naturalWidth * pad.scale;
        const h = lilyPadImage.naturalHeight * pad.scale;
        ctx.save();
        ctx.translate(pad.x, pad.y);
        ctx.rotate(pad.rotation);
        ctx.drawImage(lilyPadImage, -w / 2, -h / 2, w, h);
        ctx.restore();
      }
    }

    const boat = {
      x: window.innerWidth / 2,
      y: window.innerHeight / 2,
      heading: -Math.PI / 2,   // pointing up; sprite faces east at heading 0
      speed: 0,                // velocity is always along the heading
      // animation state
      strokeFrames: null,
      strokeStart: 0,
    };

    function paddle(side) {
      // a stroke on one side pushes the bow toward the opposite side,
      // then propels the boat along its new heading
      if (side === 'left') {
        boat.heading += TURN_PER_STROKE;
        boat.strokeFrames = LEFT_STROKE;
      } else {
        boat.heading -= TURN_PER_STROKE;
        boat.strokeFrames = RIGHT_STROKE;
      }
      boat.speed += THRUST_PER_STROKE;
      boat.strokeStart = performance.now();
    }

    // canonicalize raw key presses into game inputs, in the same spirit
    // as js/util/keyboard.js: arrows, WASD, and vim-style HJKL all map
    // onto the two paddle actions
    const PADDLE_LEFT = 'PADDLE_LEFT';
    const PADDLE_RIGHT = 'PADDLE_RIGHT';

    const KEY_BINDINGS = {
      'ArrowLeft': PADDLE_LEFT,
      'ArrowRight': PADDLE_RIGHT,
      'a': PADDLE_LEFT,
      'd': PADDLE_RIGHT,
      'h': PADDLE_LEFT,
      'l': PADDLE_RIGHT,
    };

    window.addEventListener('keydown', (e) => {
      const input = KEY_BINDINGS[e.key.length === 1 ? e.key.toLowerCase() : e.key];
      if (!input) return;
      e.preventDefault();

      if (input === PADDLE_LEFT) paddle('left');
      if (input === PADDLE_RIGHT) paddle('right');
    });

    // --- touch joysticks (nipplejs) ---
    // each press of a stick is one paddle stroke on that side
    const JOYSTICK_SIZE = 100;

    function makeJoystick(zoneId, side) {
      const stick = nipplejs.create({
        zone: document.getElementById(zoneId),
        mode: 'static',
        position: { top: '50%', left: '50%' },
        color: 'black',
        size: JOYSTICK_SIZE,
      });

      stick.on('start', function () {
        if (MODE === PADDLE) {
          paddle(side);
        }
      });

      return stick;
    }

    makeJoystick('joystick-left', 'left');
    makeJoystick('joystick-right', 'right');

    function currentFrame(now) {
      if (boat.strokeFrames) {
        const i = Math.floor((now - boat.strokeStart) / STROKE_FRAME_MS);
        if (i < boat.strokeFrames.length) return boat.strokeFrames[i];
        boat.strokeFrames = null;
      }
      return IDLE_FRAME;
    }

    // drawn inside the boat's rotated transform, so it can never
    // point a different way than the sprite: straight along local +x
    function drawVector() {
      if (boat.speed < 1) return;
      const len = Math.min(30 + boat.speed, 160);

      ctx.strokeStyle = '#ffdd55';
      ctx.fillStyle = '#ffdd55';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(len, 0);
      ctx.stroke();

      // arrowhead
      ctx.beginPath();
      ctx.moveTo(len, 0);
      ctx.lineTo(len - 9, -4);
      ctx.lineTo(len - 9, 4);
      ctx.closePath();
      ctx.fill();
    }

    let last = performance.now();
    function tick(now) {
      const dt = Math.min((now - last) / 1000, 0.1);
      last = now;

      // move along the heading, with water drag on speed
      boat.x += Math.cos(boat.heading) * boat.speed * dt;
      boat.y += Math.sin(boat.heading) * boat.speed * dt;
      boat.speed *= Math.pow(DRAG, dt);

      // wrap around the screen
      const m = FRAME_W * SCALE;
      if (boat.x < -m) boat.x = canvas.width + m;
      if (boat.x > canvas.width + m) boat.x = -m;
      if (boat.y < -m) boat.y = canvas.height + m;
      if (boat.y > canvas.height + m) boat.y = -m;

      // water
      ctx.fillStyle = '#2b6a8a';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      drawLilyPads();

      ctx.save();
      ctx.translate(boat.x, boat.y);
      // sprite faces east in the sheet, so rotate by the heading directly
      ctx.rotate(boat.heading);
      if (sheet.complete && sheet.naturalWidth) {
        const frame = currentFrame(now);
        ctx.drawImage(
          sheet,
          FRAME_X[frame], FRAME_Y, FRAME_W, FRAME_H,
          -PIVOT_X * SCALE, -PIVOT_Y * SCALE,
          FRAME_W * SCALE, FRAME_H * SCALE
        );
      }
      if (DRAW_VECTOR) drawVector();
      ctx.restore();

      const deg = ((boat.heading * 180 / Math.PI) % 360 + 360) % 360;
      stats.textContent = 'speed: ' + boat.speed.toFixed(0) + ' px/s  heading: ' + deg.toFixed(0) + '\u00B0';

      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  </script>
</body>
</html>
